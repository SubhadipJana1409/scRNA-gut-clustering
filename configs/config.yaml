# ============================================================
#  Day 20 — scRNA-seq Gut Cell Clustering Pipeline Config
# ============================================================

data:
  n_cells: 3000
  n_genes: 2000
  random_seed: 42

qc:
  min_genes_per_cell: 5      # low threshold for 2000-gene panel
  max_genes_per_cell: 1500   # filter doublets
  max_pct_mito: 25.0
  min_cells_per_gene: 3

preprocessing:
  target_sum: 10000
  log1p: true
  n_top_genes: 500
  n_pcs: 50

clustering:
  n_neighbors: 15
  n_umap_components: 2
  kmeans_k: 13
  leiden_resolution: 0.6
  use_leiden: true

annotation:
  min_score_threshold: 0.1

output:
  dir: "outputs"
  dpi: 150
  figure_format: "png"
  save_h5ad: true

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
